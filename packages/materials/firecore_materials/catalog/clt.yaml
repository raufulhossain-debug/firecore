id: clt
name: Cross-Laminated Timber
category: clt
description: >
  Engineered mass timber panels with cross-layered lumber plies.
  High strength-to-weight, carbon-sequestering, exposed-wood aesthetic.
  Growing domestic supply (OR, MT, WA mills).

domestic_availability: 0.6
buy_america_compliant: true
carbon_kg_per_sqft: -1.2  # Net carbon negative (sequestered > embodied)

climate_ratings:
  - zone: wildfire
    score: 0.6
    notes: "Mass timber chars predictably (1.5\"/hr); 2-hr fire rating achievable. Requires non-combustible cladding in WUI."
    required_treatments: ["non_combustible_cladding", "char_calculation"]
  - zone: flood
    score: 0.2
    notes: "Wood absorbs water; NOT recommended for flood zones without full elevation + waterproof membrane"
    required_treatments: ["full_elevation", "waterproof_membrane"]
  - zone: desert
    score: 0.65
    notes: "Moderate thermal mass helps with diurnal swings; lower R-value requires added insulation"
    required_treatments: ["exterior_insulation"]
  - zone: arctic
    score: 0.5
    notes: "Good structural performance in cold; thermal bridging at panel joints; needs exterior insulation wrap"
    required_treatments: ["exterior_insulation_wrap", "vapor_barrier"]
  - zone: seismic
    score: 0.85
    notes: "Excellent seismic performance — high strength-to-weight ratio, ductile connections"
  - zone: standard
    score: 0.8
    notes: "Premium material with aesthetic appeal; cost premium over SIPs"

certifications:
  - code: PRG_320
    name: "ANSI/APA PRG 320 Standard for CLT"
    status: certified
  - code: IBC_2021_CH23
    name: "IBC 2021 Chapter 23 (Mass Timber)"
    status: certified
  - code: CBC_Chapter_7A
    name: "California Chapter 7A (with cladding)"
    status: in_progress

variants:
