id: sip
name: Structural Insulated Panels
category: sip
description: >
  Factory-bonded sandwich panels (OSB + EPS/polyiso foam + OSB).
  High R-value, fast install, excellent air-tightness.
  Standard in residential prefab for walls and roofs.

domestic_availability: 0.85
buy_america_compliant: true
carbon_kg_per_sqft: 2.8

climate_ratings:
  - zone: wildfire
    score: 0.4
    notes: "OSB facing is combustible; requires Class A exterior cladding + ignition-resistant treatment for WUI"
    required_treatments: ["class_a_exterior_cladding", "ignition_resistant_coating"]
  - zone: flood
    score: 0.3
    notes: "OSB degrades with water exposure; requires moisture barrier + elevated foundation in SFHA"
    required_treatments: ["moisture_barrier", "elevated_foundation"]
  - zone: desert
    score: 0.9
    notes: "Excellent thermal performance reduces cooling loads; polyiso core performs well in heat"
  - zone: arctic
    score: 0.95
    notes: "Best-in-class R-value per inch; virtually eliminates thermal bridging"
  - zone: seismic
    score: 0.7
    notes: "Good racking strength but limited ductility; requires proper hold-downs"
    required_treatments: ["seismic_hold_downs"]
  - zone: standard
    score: 0.9
    notes: "Ideal general-purpose wall/roof system"

certifications:
  - code: ICC_ESR_1539
    name: "ICC-ES Evaluation Report (generic SIP)"
    status: certified
  - code: ASTM_E119
    name: "ASTM E119 Fire Test (1-hr with gypsum)"
    status: certified

