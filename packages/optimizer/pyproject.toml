[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "firecore-optimizer"
version = "0.1.0"
description = "FireCore multi-objective optimizer — cost, speed, carbon, compliance"
requires-python = ">=3.10"
dependencies = [
    "firecore-materials",
    "firecore-supply-chain",
    "firecore-logistics",
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.setuptools.packages.find]
include = ["firecore_optimizer*"]
