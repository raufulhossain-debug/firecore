name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/rules_engine[dev]"
          pip install -e "packages/sku_library[dev]"
          pip install -e "packages/site_intel[dev]"
          pip install -e "packages/solver[dev]"
          pip install -e "packages/api[dev]"

      - name: Run tests
        run: pytest -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages
