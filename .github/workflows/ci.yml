name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install packages
        run: |
          pip install -e packages/rules_engine
          pip install -e packages/sku_library
          pip install -e packages/site_intel
          pip install -e packages/solver
          pip install -e packages/materials
          pip install -e packages/supply_chain
          pip install -e packages/logistics
          pip install -e packages/optimizer
          pip install -e "packages/api[dev]"
          pip install pytest httpx
      - name: Run tests
        run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
